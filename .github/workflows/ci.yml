name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: snok/install-poetry@v1
        with:
          version: 1.8.5
      - run: poetry install
      - run: poetry run pytest tests/test_ira_universe_mcp.py -q
      - run: bash scripts/public_export_guard.sh .
